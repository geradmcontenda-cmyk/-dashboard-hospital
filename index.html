<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Dashboard Hospitalar - HMC</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f7fa; color: #333; }
        .header { background: linear-gradient(135deg, #0066cc 0%, #004499 100%); color: white; padding: 20px; }
        .header-content { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; gap: 20px; flex-wrap: wrap; }
        .header-title h1 { font-size: 24px; margin-bottom: 5px; }
        .header-title p { font-size: 14px; opacity: 0.9; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .filters { background: white; padding: 20px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .filter-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
        .filter-group { display: flex; flex-direction: column; }
        .filter-group label { font-weight: 600; margin-bottom: 8px; color: #0066cc; font-size: 13px; }
        .filter-group select { padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; cursor: pointer; }
        .filter-group select:hover { border-color: #0066cc; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; flex-wrap: wrap; }
        .tab-button { padding: 10px 20px; border: none; background: #f0f0f0; cursor: pointer; border-radius: 5px; font-weight: 600; transition: all 0.3s; }
        .tab-button.active { background: #0066cc; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .kpi-card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center; border-left: 4px solid #0066cc; }
        .kpi-card h3 { font-size: 12px; color: #666; margin-bottom: 10px; text-transform: uppercase; font-weight: 600; }
        .kpi-card .value { font-size: 28px; font-weight: bold; color: #0066cc; }
        .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .chart-container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .chart-container h3 { margin-bottom: 15px; color: #333; font-size: 16px; font-weight: 600; }
        .chart-wrapper { position: relative; height: 300px; }
        .chart-container.full-width { grid-column: 1 / -1; }
        .table-container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; overflow-x: auto; }
        .table-container h3 { margin-bottom: 15px; color: #333; font-size: 16px; font-weight: 600; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        thead { background: #0066cc; color: white; }
        th { padding: 12px; text-align: left; font-weight: 600; }
        td { padding: 10px 12px; border-bottom: 1px solid #eee; }
        tbody tr:hover { background: #f9f9f9; }
        .text-right { text-align: right; }
        .text-center { text-align: center; }
        .footer { text-align: center; padding: 20px; color: #999; font-size: 12px; margin-top: 40px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="header-title">
                <h1>📊 Dashboard Hospitalar</h1>
                <p>Hospital e Maternidade Miquelina Franco e Elisa Padilha</p>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- FILTROS -->
        <div class="filters">
            <div class="filter-grid">
                <div class="filter-group">
                    <label>📅 Período</label>
                    <select id="filterMes" onchange="applyFilters()">
                        <option value="">Todos os períodos</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>⚠️ Classificação de Risco</label>
                    <select id="filterRisco" onchange="applyFilters()">
                        <option value="">Todas</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>👤 Sexo</label>
                    <select id="filterSexo" onchange="applyFilters()">
                        <option value="">Todos</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>🏘️ Município</label>
                    <select id="filterMunicipio" onchange="applyFilters()">
                        <option value="">Todos</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- ABAS -->
        <div class="tabs">
            <button class="tab-button active" onclick="switchTab('executivo', this)">🏥 Executivo</button>
            <button class="tab-button" onclick="switchTab('atendimento', this)">📊 Atendimento</button>
            <button class="tab-button" onclick="switchTab('rh', this)">👥 Recursos Humanos</button>
            <button class="tab-button" onclick="switchTab('insights', this)">🔍 Insights</button>
        </div>

        <!-- ABA EXECUTIVO -->
        <div id="executivo" class="tab-content active">
            <div class="kpi-grid" id="kpiExecutivo"></div>
        </div>

        <!-- ABA ATENDIMENTO -->
        <div id="atendimento" class="tab-content">
            <div class="kpi-grid" id="kpiAtendimento"></div>
            <div class="charts-grid" id="chartsAtendimento"></div>
            <div class="table-container">
                <h3>📋 Top 50 CID</h3>
                <div id="tableCID"></div>
            </div>
        </div>

        <!-- ABA RH -->
        <div id="rh" class="tab-content">
            <div class="kpi-grid" id="kpiRH"></div>
            <div class="charts-grid" id="chartsRH"></div>
            <div class="table-container">
                <h3>📋 Resumo Mensal de RH</h3>
                <div id="tableRH"></div>
            </div>
        </div>

        <!-- ABA INSIGHTS -->
        <div id="insights" class="tab-content">
            <div id="insightsContent"></div>
        </div>
    </div>

    <div class="footer">
        <p>Desenvolvido por Ygor Limeira Bortotti - Gerente Administrativo Hospital Municipal de Contenda</p>
    </div>

    <script>
        let allData = {};
        let charts = {};

        // CARREGAR DADOS
        async function loadData() {
            try {
                const response = await fetch('./dashboard_data.json?t=' + Date.now());
                allData = await response.json();
                initializeFilters();
                renderExecutivo();
            } catch (e) {
                console.error('Erro ao carregar dados:', e);
            }
        }

        // FORMATAR MÊS
        function formatMes(mes) {
            if (!mes) return '-';
            const months = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];
            if (mes.includes('-')) {
                const [y, m] = mes.split('-');
                return `${months[parseInt(m) - 1]}/${y.slice(-2)}`;
            }
            return mes;
        }

        // INICIALIZAR FILTROS
        function initializeFilters() {
            const meses = new Set();
            const riscos = new Set();
            const sexos = new Set();
            const municipios = new Set();

            (allData.atendimento_cid || []).forEach(r => {
                if (r.Mes) meses.add(formatMes(r.Mes));
                if (r.Classificacao) riscos.add(r.Classificacao.trim());
                if (r.Sexo) sexos.add(r.Sexo.trim());
                if (r.Municipio) municipios.add(r.Municipio.trim());
            });

            populateSelect('filterMes', Array.from(meses).sort());
            populateSelect('filterRisco', Array.from(riscos).filter(r => r).sort());
            populateSelect('filterSexo', Array.from(sexos).filter(s => s).sort());
            populateSelect('filterMunicipio', Array.from(municipios).filter(m => m).sort());
        }

        function populateSelect(id, values) {
            const select = document.getElementById(id);
            values.forEach(v => {
                const opt = document.createElement('option');
                opt.value = v;
                opt.textContent = v;
                select.appendChild(opt);
            });
        }

        // OBTER DADOS FILTRADOS
        function getFiltered() {
            const mes = document.getElementById('filterMes').value;
            const risco = document.getElementById('filterRisco').value;
            const sexo = document.getElementById('filterSexo').value;
            const municipio = document.getElementById('filterMunicipio').value;

            return (allData.atendimento_cid || []).filter(row => {
                if (mes && row.Mes && formatMes(row.Mes) !== mes) return false;
                if (risco && row.Classificacao && row.Classificacao.trim() !== risco) return false;
                if (sexo && row.Sexo && row.Sexo.trim() !== sexo) return false;
                if (municipio && row.Municipio && row.Municipio.trim() !== municipio) return false;
                return true;
            });
        }

        // RENDERIZAR EXECUTIVO
        function renderExecutivo() {
            const data = getFiltered();
            const container = document.getElementById('kpiExecutivo');
            container.innerHTML = '';

            const total = data.length;
            const risco = {};
            data.forEach(r => {
                const key = r.Classificacao?.trim() || 'Desconhecido';
                risco[key] = (risco[key] || 0) + 1;
            });

            const kpis = [
                { title: 'Total de Atendimentos', value: total.toLocaleString('pt-BR') },
                { title: 'Atendimento Imediato', value: (risco['Atendimento Imediato'] || 0).toLocaleString('pt-BR') },
                { title: '10 Minutos', value: (risco['10 min'] || 0).toLocaleString('pt-BR') },
                { title: '60 Minutos', value: (risco['60 min'] || 0).toLocaleString('pt-BR') }
            ];

            kpis.forEach(kpi => {
                const card = document.createElement('div');
                card.className = 'kpi-card';
                card.innerHTML = `<h3>${kpi.title}</h3><div class="value">${kpi.value}</div>`;
                container.appendChild(card);
            });
        }

        // RENDERIZAR ATENDIMENTO
        function renderAtendimento() {
            const data = getFiltered();
            const container = document.getElementById('kpiAtendimento');
            container.innerHTML = '';

            const sexo = {};
            data.forEach(r => {
                const key = r.Sexo?.trim() || 'Desconhecido';
                sexo[key] = (sexo[key] || 0) + 1;
            });

            const kpis = [
                { title: 'Masculino', value: (sexo['Masculino'] || 0).toLocaleString('pt-BR') },
                { title: 'Feminino', value: (sexo['Feminino'] || 0).toLocaleString('pt-BR') }
            ];

            kpis.forEach(kpi => {
                const card = document.createElement('div');
                card.className = 'kpi-card';
                card.innerHTML = `<h3>${kpi.title}</h3><div class="value">${kpi.value}</div>`;
                container.appendChild(card);
            });

            // GRÁFICO DE RISCO
            const risco = {};
            data.forEach(r => {
                const key = r.Classificacao?.trim() || 'Desconhecido';
                risco[key] = (risco[key] || 0) + 1;
            });

            const chartsContainer = document.getElementById('chartsAtendimento');
            chartsContainer.innerHTML = `
                <div class="chart-container">
                    <h3>⚠️ Distribuição por Classificação de Risco</h3>
                    <div class="chart-wrapper"><canvas id="chartRisco"></canvas></div>
                </div>
            `;

            const ctx = document.getElementById('chartRisco').getContext('2d');
            if (charts.risco) charts.risco.destroy();
            charts.risco = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: Object.keys(risco),
                    datasets: [{ label: 'Atendimentos', data: Object.values(risco), backgroundColor: '#0066cc' }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });

            // TABELA CID
            const cidData = data.sort((a, b) => (b.Quantidade || 0) - (a.Quantidade || 0)).slice(0, 50);
            let html = '<table><thead><tr><th>Rank</th><th>CID</th><th>Descrição</th><th>Classificação</th><th>Quantidade</th></tr></thead><tbody>';
            cidData.forEach((r, i) => {
                html += `<tr><td class="text-center">${i + 1}</td><td>${r.CID || '-'}</td><td>${r.CID_Full || '-'}</td><td>${r.Classificacao?.trim() || '-'}</td><td class="text-right">${r.Quantidade || 0}</td></tr>`;
            });
            html += '</tbody></table>';
            document.getElementById('tableCID').innerHTML = html;
        }

        // RENDERIZAR RH
        function renderRH() {
            const mes = document.getElementById('filterMes').value;
            const rhData = (allData.rh_movimentacao || []);
            
            let filtered = rhData;
            if (mes) {
                filtered = rhData.filter(r => {
                    const rowMes = formatMes(r.Mes + '-01');
                    return rowMes === mes;
                });
            }

            const container = document.getElementById('kpiRH');
            container.innerHTML = '';

            const atestados = filtered.reduce((s, r) => s + (r.Atestados || 0), 0);
            const faltas = filtered.reduce((s, r) => s + (r.Faltas || 0), 0);
            const advertencias = filtered.reduce((s, r) => s + (r.Advertencias || 0), 0);
            const suspensao = filtered.reduce((s, r) => s + (r.Suspensao || 0), 0);
            const rescisao = filtered.reduce((s, r) => s + (r.Rescisao || 0), 0);

            const kpis = [
                { title: 'Atestados', value: atestados },
                { title: 'Faltas', value: faltas },
                { title: 'Advertências', value: advertencias },
                { title: 'Suspensão', value: suspensao },
                { title: 'Rescisões', value: rescisao }
            ];

            kpis.forEach(kpi => {
                const card = document.createElement('div');
                card.className = 'kpi-card';
                card.innerHTML = `<h3>${kpi.title}</h3><div class="value">${kpi.value.toLocaleString('pt-BR')}</div>`;
                container.appendChild(card);
            });

            // GRÁFICO RH
            const chartsContainer = document.getElementById('chartsRH');
            chartsContainer.innerHTML = `
                <div class="chart-container full-width">
                    <h3>📈 Evolução de Indicadores de RH</h3>
                    <div class="chart-wrapper"><canvas id="chartRHEvolucao"></canvas></div>
                </div>
            `;

            const rhDataSorted = (allData.rh_movimentacao || []).sort((a, b) => a.Mes.localeCompare(b.Mes));
            const ctx = document.getElementById('chartRHEvolucao').getContext('2d');
            if (charts.rhEvolucao) charts.rhEvolucao.destroy();
            
            charts.rhEvolucao = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: rhDataSorted.map(r => formatMes(r.Mes + '-01')),
                    datasets: [
                        { label: 'Atestados', data: rhDataSorted.map(r => r.Atestados || 0), borderColor: '#ff9900', tension: 0.4 },
                        { label: 'Faltas', data: rhDataSorted.map(r => r.Faltas || 0), borderColor: '#ff6b6b', tension: 0.4 },
                        { label: 'Advertências', data: rhDataSorted.map(r => r.Advertencias || 0), borderColor: '#0066cc', tension: 0.4 }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: true, position: 'bottom' } } }
            });

            // TABELA RH
            let html = '<table><thead><tr><th>Mês</th><th>Atestados</th><th>Faltas</th><th>Advertências</th><th>Suspensão</th><th>Rescisões</th></tr></thead><tbody>';
            rhDataSorted.forEach(r => {
                html += `<tr><td>${formatMes(r.Mes + '-01')}</td><td class="text-right">${r.Atestados || 0}</td><td class="text-right">${r.Faltas || 0}</td><td class="text-right">${r.Advertencias || 0}</td><td class="text-right">${r.Suspensao || 0}</td><td class="text-right">${r.Rescisao || 0}</td></tr>`;
            });
            html += '</tbody></table>';
            document.getElementById('tableRH').innerHTML = html;
        }

        // RENDERIZAR INSIGHTS
        function renderInsights() {
            const data = getFiltered();
            const total = data.length;
            
            const risco = {};
            data.forEach(r => {
                const key = r.Classificacao?.trim() || 'Desconhecido';
                risco[key] = (risco[key] || 0) + 1;
            });

            const sexo = {};
            data.forEach(r => {
                const key = r.Sexo?.trim() || 'Desconhecido';
                sexo[key] = (sexo[key] || 0) + 1;
            });

            const municipio = {};
            data.forEach(r => {
                const key = r.Municipio?.trim() || 'Desconhecido';
                municipio[key] = (municipio[key] || 0) + 1;
            });

            const rhData = (allData.rh_movimentacao || []);
            const atestados = rhData.reduce((s, r) => s + (r.Atestados || 0), 0);
            const faltas = rhData.reduce((s, r) => s + (r.Faltas || 0), 0);

            let html = `
                <div class="charts-grid">
                    <div class="chart-container">
                        <h3>📊 Resumo Geral</h3>
                        <table style="width: 100%; font-size: 14px;">
                            <tr><td>Total de Atendimentos</td><td style="text-align: right; font-weight: bold;">${total.toLocaleString('pt-BR')}</td></tr>
                            <tr><td>Atestados (RH)</td><td style="text-align: right; font-weight: bold;">${atestados.toLocaleString('pt-BR')}</td></tr>
                            <tr><td>Faltas (RH)</td><td style="text-align: right; font-weight: bold;">${faltas.toLocaleString('pt-BR')}</td></tr>
                        </table>
                    </div>
                    <div class="chart-container">
                        <h3>⚠️ Classificação de Risco</h3>
                        <table style="width: 100%; font-size: 14px;">
                            ${Object.entries(risco).map(([k, v]) => `<tr><td>${k}</td><td style="text-align: right; font-weight: bold;">${v.toLocaleString('pt-BR')}</td></tr>`).join('')}
                        </table>
                    </div>
                    <div class="chart-container">
                        <h3>👤 Distribuição por Sexo</h3>
                        <table style="width: 100%; font-size: 14px;">
                            ${Object.entries(sexo).map(([k, v]) => `<tr><td>${k}</td><td style="text-align: right; font-weight: bold;">${v.toLocaleString('pt-BR')}</td></tr>`).join('')}
                        </table>
                    </div>
                    <div class="chart-container">
                        <h3>🏘️ Top 5 Municípios</h3>
                        <table style="width: 100%; font-size: 14px;">
                            ${Object.entries(municipio).sort((a, b) => b[1] - a[1]).slice(0, 5).map(([k, v]) => `<tr><td>${k}</td><td style="text-align: right; font-weight: bold;">${v.toLocaleString('pt-BR')}</td></tr>`).join('')}
                        </table>
                    </div>
                </div>
            `;

            document.getElementById('insightsContent').innerHTML = html;
        }

        // TROCAR ABA
        function switchTab(tab, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            btn.classList.add('active');

            if (tab === 'executivo') renderExecutivo();
            else if (tab === 'atendimento') renderAtendimento();
            else if (tab === 'rh') renderRH();
            else if (tab === 'insights') renderInsights();
        }

        // APLICAR FILTROS
        function applyFilters() {
            const activeTab = document.querySelector('.tab-content.active').id;
            if (activeTab === 'executivo') renderExecutivo();
            else if (activeTab === 'atendimento') renderAtendimento();
            else if (activeTab === 'rh') renderRH();
            else if (activeTab === 'insights') renderInsights();
        }

        // CARREGAR DADOS AO INICIAR
        window.addEventListener('load', loadData);
    </script>
</body>
</html>
